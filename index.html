document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root{\n  --navy-900:#081326;       /* deepest */\n  --navy-800:#0b1a30;       /* hero base */\n  --navy-700:#0f2240;       /* section dark */\n  --navy-600:#142a4d;       /* card on dark */\n  --navy-500:#1c365e;       /* borders on dark */\n  --green-600:#0f9d63;\n  --green-500:#16c172;      /* primary */\n  --green-400:#2fd587;\n  --green-300:#7eecb8;\n  --green-glow:rgba(22,193,114,.35);\n  --light-100:#ffffff;\n  --light-200:#f5f8fa;      /* light section bg */\n  --light-300:#eef2f6;      /* light card border */\n  --ink-900:#0b1a30;        /* heading on light */\n  --ink-700:#33465e;        /* body on light */\n  --ink-500:#64768c;        /* muted on light */\n  --dim-100:#eaf1f8;        /* heading on dark */\n  --dim-300:#aebed2;        /* body on dark */\n  --dim-500:#7488a3;        /* muted on dark */\n  --radius-lg:22px;\n  --radius-md:16px;\n  --radius-sm:12px;\n  --maxw:1140px;\n  --shadow-card:0 18px 40px -18px rgba(8,19,38,.28);\n  --shadow-soft:0 10px 30px -12px rgba(8,19,38,.18);\n  --font-head:'Plus Jakarta Sans',system-ui,sans-serif;\n  --font-body:'Manrope',system-ui,sans-serif;\n}\n\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{\n  margin:0;\n  font-family:var(--font-body);\n  background:var(--navy-800);\n  color:var(--dim-100);\n  -webkit-font-smoothing:antialiased;\n  line-height:1.5;\n}\nimg{display:block;max-width:100%;}\na{color:inherit;text-decoration:none;}\nh1,h2,h3,h4{font-family:var(--font-head);margin:0;line-height:1.04;letter-spacing:-.02em;font-weight:800;}\np{margin:0;}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}\n.section{padding:96px 0;}\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--font-head);font-weight:700;font-size:15px;\n  padding:14px 26px;border-radius:999px;border:0;cursor:pointer;\n  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;\n  white-space:nowrap;\n}\n.btn svg{width:17px;height:17px;}\n.btn-green{background:var(--green-500);color:#06231a;box-shadow:0 12px 26px -10px var(--green-glow);}\n.btn-green:hover{background:var(--green-400);transform:translateY(-2px);}\n.btn-white{background:#fff;color:var(--green-600);}\n.btn-white:hover{transform:translateY(-2px);}\n.btn-lg{padding:18px 34px;font-size:17px;}\n.btn-ghost{background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--navy-500);}\n.btn-ghost:hover{background:rgba(255,255,255,.12);}\n\n/* ---------- pills / eyebrows ---------- */\n.pill{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:var(--font-head);font-weight:700;font-size:12px;letter-spacing:.06em;\n  text-transform:uppercase;padding:8px 15px;border-radius:999px;\n}\n.pill-green{background:rgba(22,193,114,.14);color:var(--green-400);border:1px solid rgba(22,193,114,.3);}\n.pill-dark{background:rgba(255,255,255,.06);color:var(--dim-300);border:1px solid var(--navy-500);}\n.pill-light{background:rgba(22,193,114,.1);color:var(--green-600);border:1px solid rgba(22,193,114,.25);}\n.pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green-500);}\n.eyebrow{font-family:var(--font-head);font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--green-500);}\n\n.tick{color:var(--green-500);flex:0 0 auto;}\n\n/* ================= NAV ================= */\n.nav{position:sticky;top:0;z-index:50;background:rgba(8,19,38,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(28,54,94,.5);}\n.nav-inner{display:flex;align-items:center;gap:28px;height:74px;}\n.brand{display:inline-flex;align-items:center;text-decoration:none;}\n.brandmark{display:inline-flex;flex-direction:column;align-items:center;line-height:1;}\n.bm-wrap{position:relative;display:inline-block;}\n.bm-word{font-family:'Gabarito',sans-serif;font-weight:700;font-size:23px;letter-spacing:-.025em;color:#fff;line-height:1;white-space:nowrap;}\n.bm-swoosh{position:absolute;left:50%;transform:translateX(-50%);width:104%;bottom:-5px;height:8px;overflow:visible;}\n.bm-sub{font-family:'Onest',sans-serif;font-weight:600;text-transform:uppercase;font-size:8.5px;letter-spacing:.34em;text-indent:.34em;margin-top:7px;color:#c3ccd6;}\n.brandmark.on-light .bm-word{color:var(--ink-900);}\n.brandmark.on-light .bm-sub{color:#7b8a9c;}\n.nav-links{display:flex;gap:26px;margin-left:14px;}\n.nav-links a{font-size:15px;font-weight:600;color:var(--dim-300);transition:color .15s;}\n.nav-links a:hover{color:#fff;}\n.nav-right{margin-left:auto;display:flex;align-items:center;gap:14px;}\n.nav-phone{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--dim-300);border:1px solid var(--navy-500);padding:9px 15px;border-radius:999px;}\n.nav-phone b{color:#fff;font-weight:700;}\n.nav-toggle{display:none;}\n\n/* ================= HERO ================= */\n.hero{position:relative;overflow:hidden;background:\n  radial-gradient(900px 500px at 12% 18%, rgba(22,193,114,.16), transparent 60%),\n  radial-gradient(800px 600px at 92% 6%, rgba(22,193,114,.12), transparent 55%),\n  linear-gradient(180deg,var(--navy-800),var(--navy-900));}\n.hero-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:54px;align-items:center;padding:72px 0 96px;}\n.hero-badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:26px;}\n.hero h1{font-size:clamp(44px,5.6vw,76px);font-weight:800;}\n.hero h1 .gk-green{color:var(--green-400);}\n.hero-sub{margin:26px 0 8px;font-size:18px;color:var(--dim-300);max-width:480px;line-height:1.6;}\n.hero-sub b{color:var(--green-400);font-weight:700;}\n.hero-disc{display:flex;align-items:center;gap:9px;font-family:var(--font-head);font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--green-400);text-transform:uppercase;margin:22px 0 26px;}\n.hero-cta{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}\n.trust{display:flex;flex-direction:column;gap:4px;background:var(--navy-700);border:1px solid var(--navy-500);border-radius:12px;padding:9px 14px;}\n.trust .t-top{font-size:11px;color:var(--dim-500);font-weight:600;}\n.trust .stars{display:flex;gap:2px;}\n.trust .stars svg{width:15px;height:15px;color:var(--green-400);}\n.trust .t-bot{font-size:12px;color:#fff;font-weight:700;display:flex;align-items:center;gap:5px;}\n.hero-fine{margin-top:16px;font-size:13px;color:var(--dim-500);}\n\n/* hero visual */\n.hero-visual{position:relative;}\n.car-row{display:flex;justify-content:center;gap:18px;margin-bottom:18px;}\n.car-chip{width:118px;height:74px;border-radius:14px;background:linear-gradient(160deg,var(--navy-600),var(--navy-700));border:1px solid var(--navy-500);display:grid;place-items:center;color:var(--dim-300);}\n.car-chip svg{width:62px;height:auto;}\n.hero-photo{position:relative;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--navy-500);box-shadow:0 30px 70px -30px rgba(0,0,0,.7);}\n.hero-photo image-slot{width:100%;height:420px;}\n.hero-tag{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.95);border-radius:999px;padding:7px 13px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink-900);box-shadow:var(--shadow-soft);}\n.hero-tag .av{display:flex;}\n.hero-tag .av span{width:16px;height:16px;border-radius:50%;border:2px solid #fff;margin-left:-6px;}\n.hero-tag .av span:first-child{margin-left:0;}\n.earn-card{position:absolute;left:18px;bottom:-22px;background:#fff;border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card);min-width:230px;}\n.earn-card .ec-av{width:42px;height:42px;border-radius:50%;overflow:hidden;flex:0 0 auto;}\n.earn-card .ec-meta .ec-name{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--green-600);text-transform:uppercase;display:flex;align-items:center;gap:6px;}\n.earn-card .ec-me 02Fdiv>\n    <div class=\"faq-list\">\n      <div class=\"acc open\">\n        <button class=\"acc-q\"><span class=\"qtag\">Most asked<\u002Fspan>What do I need to start?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>We make it easy. A valid driver license, proof of income (from rideshare or other sources) and a refundable security deposit. That's it!<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">How much can I earn?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Many drivers report $1,000–$1,500 a week driving full time on peak days. After your weekly rental, the rest is yours to keep. Earnings vary by hours and demand.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">Where can I pick up the car?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Pick up from our local hub — we'll send you the exact address and a time window once you're approved. Most drivers pick up the same day they apply.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">How long does it take to get started?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>The application takes under a minute. Approvals are typically same-day, and many drivers pick up and start earning the very same day.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">Can I use the car on Uber or Lyft?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Yes — every vehicle is pre-approved for Uber, Lyft, DoorDash and other major rideshare and delivery platforms. Drive for one or all of them.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">How and when do I get paid?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>You get paid directly by the platform you drive for, on their normal payout schedule. We only charge your flat weekly rental — everything you earn beyond that is yours.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">Is it safe to send my information?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Absolutely. Your form is encrypted and your information is protected. We never sell or trade your personal data.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">Can I drive Uber Eats or DoorDash with the same car?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Yes. One rental covers rideshare and delivery. Switch between Uber, Lyft, DoorDash, Instacart and more whenever you like.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">How much does the weekly rental cost?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Rentals start from $299 per week with insurance, maintenance, unlimited local miles and roadside service all included. No long contracts, no hidden fees.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"acc\">\n        <button class=\"acc-q\">Can I start with no app experience?\n          <svg class=\"chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"acc-a\"><p>Definitely. Plenty of our drivers start fresh. We'll point you to platform sign-up and you can be on the road in days.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FORM ============ -->\n<section class=\"form-sec section\" id=\"start\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <h2>Let's get started<\u
